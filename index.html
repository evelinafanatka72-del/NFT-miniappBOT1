<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NFT Store</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --tg-theme-bg-color: #1a1a1a;
            --tg-theme-text-color: #ffffff;
            --tg-theme-button-color: #248bcf;
            --tg-theme-secondary-bg-color: #2c2c2e;
        }

        body {
            background-color: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
        }

        .header h1 {
            font-size: 24px;
            margin: 0;
            background: linear-gradient(45deg, #00f2fe, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nft-container {
            width: 100%;
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        .card {
            background-color: var(--tg-theme-secondary-bg-color);
            border-radius: 20px;
            padding: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .image-placeholder {
            width: 100%;
            height: 180px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 40px;
        }

        .card-title {
            font-size: 18px;
            font-weight: 600;
            margin: 5px 0;
        }

        .card-price {
            color: #4facfe;
            font-size: 16px;
            margin-bottom: 15px;
        }

        .buy-btn {
            background-color: var(--tg-theme-button-color);
            color: white;
            border: none;
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .buy-btn:active {
            transform: scale(0.97);
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>NFT Mini App</h1>
        <p>Эксклюзивные цифровые активы</p>
    </div>

    <div class="nft-container">
        <div class="card">
            <div class="image-placeholder">💎</div>
            <div class="card-title">Cyber Diamond #01</div>
            <div class="card-price">1.5 TON</div>
            <button class="buy-btn" onclick="buyItem('Cyber Diamond #01')">Купить</button>
        </div>

        <div class="card">
            <div class="image-placeholder">🔥</div>
            <div class="card-title">Ether Flame #42</div>
            <div class="card-price">2.8 TON</div>
            <button class="buy-btn" onclick="buyItem('Ether Flame #42')">Купить</button>
        </div>
    </div>

    <script>
        // Инициализация WebApp
        const tg = window.Telegram.WebApp;
        tg.expand(); // Развернуть на весь экран

        function buyItem(name) {
            tg.showConfirm(`Вы действительно хотите купить ${name}?`);
        }
    </script>
</body>
</html>
