<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #0f1218; --card: #1c212b; --text: #ffffff; --accent: #4facfe; --gold: #ffd700; --red: #ff4b4b; }
        body.light { --bg: #f0f2f5; --card: #ffffff; --text: #000000; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 90px; transition: 0.3s; }
        
        .header-stats { display: flex; justify-content: space-around; background: var(--card); padding: 15px; border-bottom: 1px solid #333; position: sticky; top:0; z-index:100; }
        .stat-item span { color: var(--accent); font-weight: bold; display: block; font-size: 14px; }

        .tabs { display: none; padding: 15px; animation: fadeIn 0.3s; }
        .tabs.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .nft-card { background: var(--card); border-radius: 20px; padding: 15px; margin-bottom: 20px; position: relative; border: 1px solid rgba(255,255,255,0.05); }
        .img-box { width: 100%; height: 230px; border-radius: 15px; overflow: hidden; position: relative; background: #252a34; }
        .img-box img, .img-box video { width: 100%; height: 100%; object-fit: cover; }
        
        .watermark { position: absolute; bottom: 10px; right: 10px; opacity: 0.5; font-size: 12px; font-weight: bold; color: white; text-shadow: 1px 1px 2px black; }
        .badge { position: absolute; top: 10px; left: 10px; padding: 4px 10px; border-radius: 8px; font-size: 10px; font-weight: bold; z-index: 5; }
        .elite { background: var(--gold); color: black; box-shadow: 0 0 10px var(--gold); }
        .limited { background: var(--red); color: white; }

        .btn { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 12px; width: 100%; font-weight: bold; margin-top: 10px; cursor: pointer; }
        .btn-outline { background: transparent; border: 1px solid var(--accent); color: var(--accent); }
        .btn-sm { width: auto; padding: 5px 15px; font-size: 12px; margin-right: 5px; background: #333; }

        .nav { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; padding: 15px 0; border-top: 1px solid #333; z-index: 1000; }
        .nav-item { flex: 1; text-align: center; font-size: 11px; opacity: 0.5; }
        .nav-item.active { opacity: 1; color: var(--accent); }

        input, select, textarea { width: 100%; padding: 12px; margin-top: 10px; background: #111; border: 1px solid #444; border-radius: 12px; color: white; box-sizing: border-box; }
        .setting-item { background: var(--card); padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #333; }
    </style>
</head>
<body>

<div class="header-stats">
    <div class="stat-item">TON<span id="bal-ton">0.00</span></div>
    <div class="stat-item">NFcoin<span id="bal-nf">0</span></div>
    <div class="stat-item">LTFER<span id="bal-ltfer">0</span></div>
</div>

<div id="market" class="tabs active">
    <h2>🛒 Маркет</h2>
    <div id="market-list"></div>
</div>

<div id="quests" class="tabs">
    <h2>💰 Задания</h2>
    <div class="nft-card">
        <b>Подписка на канал</b><br><small>+280 NFcoin</small>
        <button class="btn" onclick="addReward('nf', 280, this)">Выполнить</button>
    </div>
    <div class="nft-card">
        <b>Пригласить друга</b><br><small>+1 TON</small>
        <button class="btn" onclick="addReward('ton', 1, this)">Выполнить</button>
    </div>
</div>

<div id="create" class="tabs">
    <h2>➕ Создать NFT</h2>
    <div class="nft-card">
        <div class="img-box" id="pre-box" onclick="document.getElementById('f').click()">
            <div style="text-align:center; padding-top:100px">Нажми для загрузки</div>
        </div>
        <input type="file" id="f" style="display:none" onchange="handleFile(this)">
        <input type="text" id="nn" placeholder="Название NFT">
        <input type="number" id="np" placeholder="Цена (для платных)">
        <select id="nc"><option>NFcoin</option><option>TON</option></select>
        <label style="display:block; margin-top:15px"><input type="checkbox" id="is-e"> Статус ELITE (1000 NFcoin)</label>
        <label style="display:block; margin-top:5px"><input type="checkbox" id="is-l"> LIMITED Edition</label>
        <button class="btn" onclick="publish(false)">Опубликовать</button>
        <button class="btn btn-outline" onclick="publish(true)">Сделать бесплатным</button>
    </div>
</div>

<div id="profile" class="tabs">
    <div style="text-align:center; padding: 20px;">
        <div id="prof-ava" style="width:80px; height:80px; background:var(--accent); border-radius:50%; margin: 0 auto 10px auto; line-height:80px; font-size:30px;">👤</div>
        <h2 id="prof-name">Пользователь</h2>
        <p id="prof-status">NFT Коллекционер</p>
    </div>
    <h3>Мои NFT</h3>
    <div id="my-nfts"></div>
</div>

<div id="settings" class="tabs">
    <h2>⚙️ Настройки</h2>
    <div class="setting-item" onclick="toggleIncognito()">👤 Инкогнито <b id="inc-label">ВЫКЛ</b></div>
    <div class="setting-item" onclick="togglePrivate()">🔒 Приватность <b id="priv-label">ВЫКЛ</b></div>
    <div class="setting-item" onclick="changeLang()">🌐 Язык <b id="lang-label">Русский</b></div>
    <div class="setting-item" onclick="tg.showAlert('Жалоба отправлена модератору!')">🛠 Служба поддержки</div>
    <button class="btn" style="background:#444" onclick="location.reload()">🔄 Перезагрузить</button>
</div>

<nav class="nav">
    <div class="nav-item active" onclick="tab('market', this)">🛒</div>
    <div class="nav-item" onclick="tab('quests', this)">💰</div>
    <div class="nav-item" onclick="tab('create', this)">➕</div>
    <div class="nav-item" onclick="tab('profile', this)">👤</div>
    <div class="nav-item" onclick="tab('settings', this)">⚙️</div>
</nav>

<script>
    const tg = window.Telegram.WebApp;
    let store = JSON.parse(localStorage.getItem('nft_final_v1')) || { bal: {ton:0, nf:500, ltfer:0}, items: [], inc: false, priv: false, lang: 'RU' };

    function save() { localStorage.setItem('nft_final_v1', JSON.stringify(store)); update(); }
    
    function update() {
        document.getElementById('bal-ton').innerText = store.bal.ton.toFixed(2);
        document.getElementById('bal-nf').innerText = store.bal.nf;
        document.getElementById('bal-ltfer').innerText = store.bal.ltfer;
        document.getElementById('inc-label').innerText = store.inc ? "ВКЛ" : "ВЫКЛ";
        document.getElementById('priv-label').innerText = store.priv ? "ВКЛ" : "ВЫКЛ";
        document.getElementById('lang-label').innerText = store.lang === 'RU' ? "Русский" : "English";
        
        if(store.inc) {
            document.getElementById('prof-name').innerText = "Пользователь Z";
            document.getElementById('prof-ava').innerText = "🕶";
        } else {
            document.getElementById('prof-name').innerText = "Пользователь";
            document.getElementById('prof-ava').innerText = "👤";
        }
        render();
    }

    function tab(id, el) {
        document.querySelectorAll('.tabs').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
    }

    function addReward(cur, val, btn) {
        store.bal[cur] += val; btn.disabled = true; btn.innerText = "Готово"; save();
    }

    function handleFile(input) {
        const reader = new FileReader();
        reader.onload = (e) => {
            document.getElementById('pre-box').innerHTML = `<img src="${e.target.result}"><div class="watermark">NFTzet</div>`;
        };
        reader.readAsDataURL(input.files[0]);
    }

    function publish(free) {
        const name = document.getElementById('nn').value;
        const elite = document.getElementById('is-e').checked;
        if(!name) return tg.showAlert("Дайте название!");
        if(elite && store.bal.nf < 1000) return tg.showAlert("Нужно 1000 NFcoin!");
        if(elite) store.bal.nf -= 1000;

        const item = { 
            name, elite, 
            price: free ? 0 : document.getElementById('np').value, 
            cur: document.getElementById('nc').value,
            lim: document.getElementById('is-l').checked,
            img: document.getElementById('pre-box').innerHTML 
        };
        store.items.unshift(item);
        save();
        tab('market', document.querySelectorAll('.nav-item')[0]);
        tg.showAlert("NFT Опубликован!");
    }

    function render() {
        const list = document.getElementById('market-list');
        list.innerHTML = '';
        store.items.forEach(i => {
            list.innerHTML += `
                <div class="nft-card">
                    ${i.elite ? '<div class="badge elite">ELITE</div>' : ''}
                    ${i.lim ? '<div class="badge limited" style="left:auto; right:10px">LIMITED</div>' : ''}
                    <div class="img-box">${i.img || '<div style="padding-top:100px; text-align:center">Без фото</div>'}</div>
                    <h3>${i.name}</h3>
                    <button class="btn" onclick="tg.showAlert('Куплено!')">Купить: ${i.price} ${i.cur}</button>
                </div>`;
        });
    }

    function toggleIncognito() { store.inc = !store.inc; save(); }
    function togglePrivate() { store.priv = !store.priv; save(); }
    function changeLang() { store.lang = store.lang === 'RU' ? 'EN' : 'RU'; save(); }

    update();
</script>
</body>
</html>
