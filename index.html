<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NFTzet OMNI-ULTIMATUM V7.0</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        /* * ==========================================
         * 1. ГЛОБАЛЬНЫЙ ДИЗАЙН СИСТЕМЫ
         * ========================================== */
        :root { 
            --bg: #0a0c10; 
            --card: #161a23; 
            --card-accent: #1f2430;
            --text: #ffffff; 
            --text-muted: #a0a0ab;
            --accent: #0088cc; 
            --accent-lite: #4facfe;
            --gradient: linear-gradient(135deg, #0088cc 0%, #4facfe 100%);
            --danger: #ff453a; 
            --success: #32d74b;
            --warning: #ffd60a;
            --stars: #febd2e;
            --premium: #bf5af2;
            
            /* Цвета редкости */
            --common: #8e8e93;
            --rare: #0a84ff;
            --epic: #bf5af2;
            --legendary: #ff9f0a;
        }

        body { 
            background: var(--bg); color: var(--text); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; padding-bottom: 120px; 
            overflow-x: hidden; -webkit-font-smoothing: antialiased;
            user-select: none;
        }

        /* * ==========================================
         * 2. ЭФФЕКТЫ И АНИМАЦИИ
         * ========================================== */
        @keyframes shine {
            from { transform: translateX(-100%); }
            to { transform: translateX(100%); }
        }

        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(255, 69, 58, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(255, 69, 58, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 69, 58, 0); }
        }

        /* * ==========================================
         * 3. ШАПКА И ПРОГРЕСС
         * ========================================== */
        .main-header {
            background: rgba(22, 26, 35, 0.8);
            backdrop-filter: blur(20px);
            padding: 20px;
            position: sticky; top: 0; z-index: 1000;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .user-row { display: flex; justify-content: space-between; align-items: center; }
        .lvl-pill { 
            background: var(--warning); color: #000; 
            padding: 2px 8px; border-radius: 8px; 
            font-size: 11px; font-weight: 900; margin-left: 8px;
        }

        .xp-container { width: 100%; height: 8px; background: rgba(255,255,255,0.1); border-radius: 10px; margin-top: 15px; overflow: hidden; }
        .xp-fill { height: 100%; background: var(--gradient); width: 0%; transition: 0.8s cubic-bezier(0.22, 1, 0.36, 1); }

        /* * ==========================================
         * 4. КОШЕЛЕК
         * ========================================== */
        .wallets-box { display: flex; gap: 12px; overflow-x: auto; margin-top: 15px; padding-bottom: 5px; scrollbar-width: none; }
        .wallets-box::-webkit-scrollbar { display: none; }
        .wallet-card { 
            min-width: 115px; background: var(--card-accent); 
            padding: 12px; border-radius: 18px; 
            border: 1px solid rgba(255,255,255,0.05);
            transition: 0.2s;
        }
        .wallet-card:active { transform: scale(0.95); background: var(--card); }
        .wallet-card span { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
        .wallet-card b { display: block; font-size: 16px; margin-top: 4px; color: var(--accent-lite); }

        /* * ==========================================
         * 5. КАРТОЧКИ NFT (ULTRA STYLE)
         * ========================================== */
        .nft-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px; }
        
        .nft-item {
            background: var(--card); border-radius: 22px; overflow: hidden;
            border: 1px solid rgba(255,255,255,0.06);
            position: relative; transition: all 0.3s ease;
        }
        .nft-item:active { transform: scale(0.97); }

        .nft-image-wrapper { width: 100%; height: 160px; position: relative; background: #000; }
        .nft-img { width: 100%; height: 100%; object-fit: cover; }
        
        .rarity-tag {
            position: absolute; top: 10px; left: 10px;
            padding: 4px 10px; border-radius: 10px;
            font-size: 9px; font-weight: 800; text-transform: uppercase;
            backdrop-filter: blur(8px); color: white;
        }

        .item-info { padding: 12px; }
        .item-name { font-size: 14px; font-weight: 700; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .item-author { font-size: 11px; color: var(--text-muted); margin-top: 4px; display: block; }
        
        .price-row { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-top: 10px; padding-top: 8px; border-top: 1px solid rgba(255,255,255,0.05);
        }
        .price-val { font-size: 13px; font-weight: 800; color: var(--accent-lite); }

        /* Свечение редкости */
        .rare-glow { box-shadow: 0 0 15px rgba(10, 132, 255, 0.2); border-color: var(--rare); }
        .epic-glow { box-shadow: 0 0 15px rgba(191, 90, 242, 0.2); border-color: var(--epic); }
        .leg-glow { box-shadow: 0 0 20px rgba(255, 159, 10, 0.3); border-color: var(--legendary); }

        /* * ==========================================
         * 6. БЕЗОПАСНОСТЬ (12,280 УСТРОЙСТВ)
         * ========================================== */
        .security-banner {
            background: rgba(255, 69, 58, 0.1);
            border: 1px solid var(--danger);
            border-radius: 20px;
            margin: 15px; padding: 20px;
            animation: pulse-red 2s infinite;
        }

        .device-count { font-size: 28px; font-weight: 900; color: var(--danger); display: block; }

        /* * ==========================================
         * 7. ФОРМЫ И КНОПКИ
         * ========================================== */
        .input-field {
            width: 100%; background: var(--card-accent); border: 1px solid rgba(255,255,255,0.05);
            padding: 16px; border-radius: 18px; color: white; margin-bottom: 15px;
            font-size: 15px; outline: none; box-sizing: border-box;
        }

        .btn-action {
            width: 100%; padding: 18px; border-radius: 20px; border: none;
            font-weight: 800; font-size: 16px; cursor: pointer; transition: 0.3s;
            margin-bottom: 10px;
        }
        .btn-main { background: var(--gradient); color: white; box-shadow: 0 8px 20px rgba(0, 136, 204, 0.3); }
        .btn-ghost { background: var(--success); color: white; }

        /* * ==========================================
         * 8. НАВИГАЦИЯ
         * ========================================== */
        .nav-bar {
            position: fixed; bottom: 0; width: 100%;
            background: rgba(22, 26, 35, 0.95);
            backdrop-filter: blur(15px);
            display: flex; padding: 15px 0 35px;
            border-top: 1px solid rgba(255,255,255,0.05);
            z-index: 2000;
        }
        .nav-item { flex: 1; text-align: center; font-size: 24px; opacity: 0.3; transition: 0.3s; }
        .nav-item.active { opacity: 1; color: var(--accent-lite); transform: translateY(-8px); }

        .page { display: none; padding: 10px 5px; }
        .page.active { display: block; animation: slideUp 0.4s ease; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* РЕЙТИНГ */
        .leader-item {
            display: flex; align-items: center; gap: 15px;
            padding: 15px 20px; border-bottom: 1px solid rgba(255,255,255,0.05);
        }
    </style>
</head>
<body>

    <header class="main-header">
        <div class="user-row">
            <div>
                <span style="color:var(--text-muted); font-size:12px">Профиль NFTzet</span>
                <div style="display:flex; align-items:center">
                    <b id="h-username" style="font-size:18px">...</b>
                    <span class="lvl-pill">LVL <span id="h-level">1</span></span>
                </div>
            </div>
            <div style="text-align:right">
                <span style="color:var(--stars); font-size:14px">★ <b id="h-stars">0</b></span>
            </div>
        </div>
        <div class="xp-container"><div id="h-xp-bar" class="xp-fill"></div></div>
        
        <div class="wallets-box">
            <div class="wallet-card" onclick="addMoney('ton')"><span>TON Coin</span><b id="w-ton">0.00</b></div>
            <div class="wallet-card" onclick="addMoney('nf')"><span>NFcoin</span><b id="w-nf">0</b></div>
            <div class="wallet-card" onclick="addMoney('stars')"><span>Stars</span><b id="w-stars">0</b></div>
        </div>
    </header>

    <main id="p-market" class="page active">
        <div style="padding:15px; display:flex; justify-content:space-between; align-items:center">
            <h2 style="margin:0">Лента Облака</h2>
            <button onclick="syncAll()" style="background:none; border:none; color:var(--accent-lite); font-weight:bold">Обновить</button>
        </div>
        <div id="cloud-list" class="nft-container"></div>
    </main>

    <section id="p-rank" class="page">
        <h2 style="padding:20px">Зал Славы 🏆</h2>
        <div id="leaderboard" style="background:var(--card); margin:0 15px; border-radius:25px; overflow:hidden">
            </div>
    </section>

    <section id="p-create" class="page">
        <h2 style="padding:20px">Создать Шедевр</h2>
        <div style="padding:0 20px">
            <div id="drop-zone" onclick="document.getElementById('file-input').click()" style="width:100%; height:220px; border:2px dashed var(--accent); border-radius:25px; display:flex; align-items:center; justify-content:center; background:var(--card); overflow:hidden">
                <div id="drop-text" style="text-align:center; color:var(--text-muted)">
                    <span style="font-size:40px">🖼</span><br>Загрузите изображение
                </div>
            </div>
            <input type="file" id="file-input" hidden accept="image/*" onchange="processFile(this)">

            <input type="text" id="in-title" class="input-field" style="margin-top:20px" placeholder="Название NFT">
            <textarea id="in-about" class="input-field" rows="3" placeholder="Описание (история, редкость...)"></textarea>
            
            <div style="display:flex; gap:10px">
                <input type="number" id="in-cost" class="input-field" placeholder="Цена">
                <select id="in-rarity" class="input-field" style="width:140px">
                    <option value="common">Обычный</option>
                    <option value="rare">Редкий</option>
                    <option value="epic">Эпик</option>
                    <option value="legendary">Легенда</option>
                </select>
            </div>

            <button class="btn-action btn-main" onclick="publish(false)">Опубликовать</button>
            <button class="btn-action btn-ghost" onclick="publish(true)">🎁 Бесплатная раздача</button>
        </div>
    </section>

    <section id="p-profile" class="page">
        <div class="security-banner">
            <span style="font-size:11px; text-transform:uppercase; letter-spacing:1px">Обнаружены сессии</span>
            <b class="device-count" id="dev-count">12,280</b>
            <div style="display:flex; justify-content:space-between; align-items:center; margin-top:10px">
                <span style="font-size:12px">Статус: <b>Безопасно</b></span>
                <button onclick="tg.showAlert('Все сессии под контролем 2FA')" style="background:var(--danger); border:none; color:white; padding:5px 12px; border-radius:8px; font-size:10px; font-weight:bold">ЗАВЕРШИТЬ ВСЕ</button>
            </div>
        </div>

        <div style="text-align:center; padding:20px">
            <div style="width:90px; height:90px; background:var(--gradient); border-radius:50%; margin:0 auto; font-size:40px; display:flex; align-items:center; justify-content:center; box-shadow: 0 10px 30px rgba(0,0,0,0.5)">👤</div>
            <h2 id="u-name" style="margin:15px 0 5px">Пользователь</h2>
            <p id="u-status" style="color:var(--text-muted); font-size:12px; margin-bottom:20px">Профессиональный разработчик</p>
            <button class="btn-action btn-main" style="width:auto; padding:10px 25px; font-size:12px" onclick="editName()">ИЗМЕНИТЬ НИК</button>
        </div>

        <h3 style="padding:0 20px">Мои NFT (<span id="u-count">0</span>)</h3>
        <div id="u-inventory" class="nft-container"></div>
    </section>

    <nav class="nav-bar">
        <div class="nav-item active" onclick="nav('p-market', this)">🛒</div>
        <div class="nav-item" onclick="nav('p-rank', this)">🏆</div>
        <div class="nav-item" onclick="nav('p-create', this)">➕</div>
        <div class="nav-item" onclick="nav('p-profile', this)">👤</div>
    </nav>

    <canvas id="proc-canvas" style="display:none"></canvas>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.enableClosingConfirmation();

        // КОНФИГУРАЦИЯ ОБЛАКА (JSONBin)
        const DB_URL = "https://api.jsonbin.io/v3/b/65fd5a7a1f5677401f4142e8";
        const API_KEY = "$2a$10$7XyH/zH2I2.M2.M1.m1.m1.m1.m1.m1.m1.m1.m1.m1.m1.m1.m1";

        // ЛОКАЛЬНАЯ БАЗА
        let state = JSON.parse(localStorage.getItem('NFTZET_ULTRA_V7')) || {
            user: { name: tg.initDataUnsafe?.user?.first_name || "Коллекционер", lvl: 1, xp: 0 },
            wallet: { ton: 0, nf: 250, stars: 0 },
            inventory: []
        };

        let cloudData = { items: [], users: [] };
        let activeImage = "";

        // 1. СИНХРОНИЗАЦИЯ
        async function syncAll() {
            try {
                const r = await fetch(`${DB_URL}/latest?t=${Date.now()}`, { headers: { "X-Master-Key": API_KEY } });
                const d = await r.json();
                cloudData = d.record || { items: [], users: [] };
                renderAll();
            } catch(e) { console.error("Cloud Error"); }
        }

        async function pushCloud() {
            await fetch(DB_URL, {
                method: 'PUT',
                headers: { "Content-Type": "application/json", "X-Master-Key": API_KEY },
                body: JSON.stringify(cloudData)
            });
        }

        // 2. РЕНДЕРИНГ
        function renderAll() {
            // Лента Маркета
            const list = document.getElementById('cloud-list');
            list.innerHTML = cloudData.items.map(item => `
                <div class="nft-item ${item.rarity}-glow" onclick="previewItem(${item.id})">
                    <div class="nft-image-wrapper">
                        <div class="rarity-tag" style="background:var(--${item.rarity})">${item.rarity}</div>
                        <img src="${item.img}" class="nft-img">
                    </div>
                    <div class="item-info">
                        <h4 class="item-name">${item.name}</h4>
                        <span class="item-author">@${item.author}</span>
                        <div class="price-row">
                            <span class="price-val">${item.price === 0 ? 'FREE' : item.price + ' TON'}</span>
                            <span style="font-size:10px; color:var(--text-muted)">#${item.id.toString().slice(-4)}</span>
                        </div>
                    </div>
                </div>
            `).join('');

            // Рейтинг
            const leaders = document.getElementById('leaderboard');
            const sorted = [...cloudData.users].sort((a,b) => b.lvl - a.lvl).slice(0, 10);
            leaders.innerHTML = sorted.map((u, i) => `
                <div class="leader-item">
                    <b style="width:30px; color:var(--text-muted)">${i+1}</b>
                    <div style="width:35px; height:35px; border-radius:50%; background:var(--gradient)"></div>
                    <div style="flex:1"><b>${u.name}</b></div>
                    <div style="color:var(--warning); font-weight:bold">LVL ${u.lvl}</div>
                </div>
            `).join('');
        }

        // 3. ФУНКЦИИ NFT
        function processFile(input) {
            const file = input.files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.getElementById('proc-canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = 600; canvas.height = 600;
                    ctx.drawImage(img, 0, 0, 600, 600);
                    activeImage = canvas.toDataURL("image/jpeg", 0.7);
                    document.getElementById('drop-text').innerHTML = `<img src="${activeImage}" style="width:100%; height:100%; object-fit:cover; border-radius:23px">`;
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        async function publish(isFree) {
            const title = document.getElementById('in-title').value;
            const price = isFree ? 0 : parseFloat(document.getElementById('in-cost').value);
            const rarity = document.getElementById('in-rarity').value;
            const desc = document.getElementById('in-about').value;

            if(!title || !activeImage || (!isFree && isNaN(price))) return tg.showAlert("Ошибка: Заполните все поля!");

            tg.showConfirm("Выставить NFT в общее Облако?", async (ok) => {
                if(ok) {
                    const newItem = {
                        id: Date.now(), name: title, desc, price, rarity,
                        img: activeImage, author: state.user.name
                    };
                    cloudData.items.unshift(newItem);
                    
                    // Обновляем статус юзера в облаке
                    updateUserInCloud();
                    
                    await pushCloud();
                    tg.showAlert("✅ NFT опубликован!");
                    location.reload();
                }
            });
        }

        function previewItem(id) {
            const item = cloudData.items.find(x => x.id === id);
            tg.showConfirm(`Вы хотите купить "${item.name}" за ${item.price} TON?`, (ok) => {
                if(ok) {
                    if(state.wallet.ton >= item.price || item.price === 0) {
                        state.wallet.ton -= item.price;
                        state.inventory.unshift(item);
                        addXP(20);
                        save();
                        tg.showAlert("🎉 Поздравляем! Предмет в вашей коллекции.");
                    } else {
                        tg.showAlert("❌ Недостаточно TON!");
                    }
                }
            });
        }

        // 4. СЛУЖЕБНОЕ
        function nav(pageId, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(t => t.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            el.classList.add('active');
            if(pageId === 'p-profile') renderInv();
            syncAll();
        }

        function addXP(val) {
            state.user.xp += val;
            if(state.user.xp >= 100) {
                state.user.lvl++;
                state.user.xp = 0;
                tg.showAlert("🆕 УРОВЕНЬ ПОВЫШЕН!");
            }
            save();
            updateUserInCloud();
        }

        function updateUserInCloud() {
            const idx = cloudData.users.findIndex(u => u.name === state.user.name);
            if(idx > -1) cloudData.users[idx].lvl = state.user.lvl;
            else cloudData.users.push({ name: state.user.name, lvl: state.user.lvl });
        }

        function save() {
            localStorage.setItem('NFTZET_ULTRA_V7', JSON.stringify(state));
            updateUI();
        }

        function updateUI() {
            document.getElementById('h-username').innerText = state.user.name;
            document.getElementById('u-name').innerText = state.user.name;
            document.getElementById('h-level').innerText = state.user.lvl;
            document.getElementById('h-xp-bar').style.width = state.user.xp + "%";
            document.getElementById('w-ton').innerText = state.wallet.ton.toFixed(2);
            document.getElementById('w-nf').innerText = state.wallet.nf;
            document.getElementById('w-stars').innerText = state.wallet.stars;
            document.getElementById('u-count').innerText = state.inventory.length;
        }

        function renderInv() {
            const inv = document.getElementById('u-inventory');
            inv.innerHTML = state.inventory.map(i => `
                <div class="nft-item">
                    <img src="${i.img}" class="nft-img" style="height:140px">
                    <div class="item-info"><b>${i.name}</b></div>
                </div>
            `).join('');
        }

        function addMoney(type) {
            state.wallet[type] += 50;
            save();
            tg.HapticFeedback.notificationOccurred('success');
        }

        function editName() {
            const n = prompt("Ваше новое имя:", state.user.name);
            if(n) { state.user.name = n; save(); updateUserInCloud(); pushCloud(); }
        }

        // СТАРТ
        updateUI();
        syncAll();
    </script>
</body>
</html>
