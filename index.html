<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NFTzet Mini App</title>

<style>
:root {
    --bg: #121212;
    --text: #ffffff;
    --card: #1e1e1e;
}

.light {
    --bg: #ffffff;
    --text: #000000;
    --card: #f2f2f2;
}

body {
    margin: 0;
    font-family: Arial;
    background: var(--bg);
    color: var(--text);
}

nav {
    display: flex;
    justify-content: space-around;
    background: var(--card);
    padding: 10px;
}

nav button {
    background: none;
    border: none;
    color: var(--text);
    font-size: 14px;
    cursor: pointer;
}

.page {
    display: none;
    padding: 15px;
}

.active {
    display: block;
}

.card {
    background: var(--card);
    padding: 10px;
    margin: 10px 0;
    border-radius: 10px;
}
</style>
</head>

<body>

<nav>
<button onclick="openPage('profile')">Профиль</button>
<button onclick="openPage('market')">Маркет</button>
<button onclick="openPage('community')">Сообщества</button>
<button onclick="openPage('create')">Создать</button>
<button onclick="openPage('settings')">Настройки</button>
</nav>

<!-- ПРОФИЛЬ -->
<div id="profile" class="page active">
<h2>Профиль</h2>
<input id="nickname" placeholder="Ник">
<button onclick="saveProfile()">Сохранить</button>
<p id="showNick"></p>
</div>

<!-- МАРКЕТ -->
<div id="market" class="page">
<h2>Маркет NFT</h2>
<div id="nftList"></div>
</div>

<!-- СООБЩЕСТВА -->
<div id="community" class="page">
<h2>Сообщества</h2>
<input id="communityName" placeholder="Название">
<button onclick="createCommunity()">Создать</button>
<div id="communityList"></div>
</div>

<!-- СОЗДАТЬ NFT -->
<div id="create" class="page">
<h2>Создать NFT</h2>
<input id="nftName" placeholder="Название"><br><br>
<textarea id="nftDesc" placeholder="Описание"></textarea><br><br>
<input type="number" id="nftPrice" placeholder="Цена"><br><br>

<button onclick="createNFT()">Опубликовать</button>
<button onclick="createNFT(true)">Опубликовать бесплатно</button>
</div>

<!-- НАСТРОЙКИ -->
<div id="settings" class="page">
<h2>Настройки</h2>

<label>
<input type="checkbox" id="incognito" onchange="toggleIncognito()">
Инкогнито
</label><br><br>

<label>
<input type="checkbox" onchange="toggleTheme()">
Светлая тема
</label><br><br>

<button onclick="reloadApp()">Перезагрузка</button>

</div>

<script>
let data = JSON.parse(localStorage.getItem("app")) || {
    profile: {nick: "User"},
    nft: [],
    communities: [],
    incognito: false
};

function save() {
    localStorage.setItem("app", JSON.stringify(data));
}

function openPage(id) {
    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

function saveProfile() {
    data.profile.nick = document.getElementById("nickname").value;
    save();
    renderProfile();
}

function renderProfile() {
    let nick = data.incognito ? "Secret" : data.profile.nick;
    document.getElementById("showNick").innerText = "Ник: " + nick;
}

function createNFT(free=false) {
    let nft = {
        name: document.getElementById("nftName").value,
        desc: document.getElementById("nftDesc").value,
        price: free ? 0 : document.getElementById("nftPrice").value
    };
    data.nft.push(nft);
    save();
    renderNFT();
}

function renderNFT() {
    let list = document.getElementById("nftList");
    list.innerHTML = "";
    data.nft.forEach(n => {
        list.innerHTML += `
        <div class="card">
        <b>${n.name}</b><br>
        ${n.desc}<br>
        Цена: ${n.price}
        </div>`;
    });
}

function createCommunity() {
    let name = document.getElementById("communityName").value;
    data.communities.push(name);
    save();
    renderCommunities();
}

function renderCommunities() {
    let list = document.getElementById("communityList");
    list.innerHTML = "";
    data.communities.forEach(c => {
        list.innerHTML += `<div class="card">${c}</div>`;
    });
}

function toggleIncognito() {
    data.incognito = !data.incognito;
    save();
    renderProfile();
}

function toggleTheme() {
    document.body.classList.toggle("light");
}

function reloadApp() {
    location.reload();
}

renderProfile();
renderNFT();
renderCommunities();
</script>

</body>
</html>
