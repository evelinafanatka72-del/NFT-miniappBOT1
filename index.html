<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #0f1218; --card: #1c212b; --text: #ffffff; --accent: #4facfe; --green: #4caf50; }
        body.light { --bg: #f0f2f5; --card: #ffffff; --text: #000000; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 100px; transition: 0.3s; overflow-x: hidden; }
        
        .header-stats { display: flex; justify-content: space-around; background: var(--card); padding: 15px; border-bottom: 1px solid #333; position: sticky; top:0; z-index:100; }
        .stat-item span { color: var(--accent); font-weight: bold; display: block; }

        .tabs { display: none; padding: 15px; animation: fadeIn 0.2s; }
        .tabs.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .nft-card { background: var(--card); border-radius: 20px; padding: 15px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .img-box { width: 100%; min-height: 250px; border-radius: 15px; overflow: hidden; background: #252a34; display: flex; align-items: center; justify-content: center; border: 1px solid #333; }
        .img-box img { width: 100%; height: auto; display: block; object-fit: contain; }
        
        .btn { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 8px; font-size: 14px; }
        .btn-sec { background: #333; }
        .btn-gen { background: linear-gradient(45deg, #f093fb, #f5576c); }

        input, textarea, select { width: 100%; padding: 12px; margin-top: 8px; background: #111; border: 1px solid #333; border-radius: 10px; color: white; box-sizing: border-box; }
        
        .nav { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; padding: 10px 0; border-top: 1px solid #333; z-index: 1000; }
        .nav-item { flex: 1; text-align: center; font-size: 24px; opacity: 0.3; transition: 0.3s; cursor: pointer; }
        .nav-item.active { opacity: 1; color: var(--accent); transform: translateY(-3px); }

        .setting-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; cursor: pointer; }
    </style>
</head>
<body>

<div class="header-stats">
    <div class="stat-item">TON<span id="bal-ton">0.00</span></div>
    <div class="stat-item">NFcoin<span id="bal-nf">100</span></div>
</div>

<div id="market" class="tabs active">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2>🛒 Маркет</h2> 
        <button onclick="loadCloud()" class="btn" style="width:auto; margin:0; padding: 5px 15px;">🔄 Обновить</button>
    </div>
    <div id="market-list"></div>
</div>

<div id="groups" class="tabs">
    <h2>👥 Сообщества</h2>
    <button class="btn" onclick="createGroup()">+ Создать сообщество</button>
    <div id="group-list" style="margin-top:15px"></div>
</div>

<div id="create" class="tabs">
    <h2>➕ Создать NFT</h2>
    <div class="nft-card">
        <div class="img-box" id="pre-box" onclick="document.getElementById('f').click()" style="cursor:pointer">
            <div id="pre-text" style="text-align:center; padding:20px;">📸 Нажми, чтобы загрузить<br><small>Водяной знак NFTzet добавится сам</small></div>
        </div>
        <input type="file" id="f" style="display:none" accept="image/*" onchange="handleFile(this)">
        
        <button class="btn btn-gen" onclick="aiGen()">🤖 AI Генерация (Random)</button>
        
        <input type="text" id="nn" placeholder="Название NFT">
        <textarea id="nd" placeholder="Описание (минимум 10 символов)..."></textarea>
        
        <div style="display:flex; gap:10px">
            <input type="number" id="np" placeholder="Цена" style="flex:2">
            <select id="nc" style="flex:1"><option>TON</option><option>NFcoin</option></select>
        </div>
        
        <button class="btn" onclick="publish(false)">Опубликовать</button>
        <button class="btn btn-sec" onclick="publish(true)">Выложить бесплатно</button>
    </div>
</div>

<div id="profile" class="tabs">
    <div style="text-align:center; padding: 20px; background: var(--card); border-radius: 20px;">
        <div id="p-ava" onclick="editName()" style="width:70px; height:70px; background:var(--accent); border-radius:50%; margin:0 auto 10px; font-size:30px; line-height:70px; cursor:pointer;">👤</div>
        <h2 id="p-name" style="margin:0">User</h2>
        <p id="p-sub" style="color:var(--accent); font-weight:bold; margin:5px 0 0 0;"></p>
        <button class="btn" onclick="openNickPicker()" style="margin-top:15px">Выбрать NFT в ник</button>
    </div>
    <h3>🛍 Моя Коллекция</h3>
    <div id="bought-list"></div>
</div>

<div id="settings" class="tabs">
    <h2>⚙️ Настройки</h2>
    <div class="nft-card" onclick="toggle('inc')"><div class="setting-row"><span>👤 Режим инкогнито</span> <span id="s-inc" style="color:var(--accent)">ВЫКЛ</span></div></div>
    <div class="nft-card" onclick="toggle('theme')"><div class="setting-row"><span>🌓 Тема</span> <span id="s-theme" style="color:var(--accent)">ТЕМНАЯ</span></div></div>
    <div class="nft-card" onclick="toggle('priv')"><div class="setting-row"><span>🔒 Приватность</span> <span id="s-priv" style="color:var(--accent)">ВЫКЛ</span></div></div>
    <div class="nft-card" onclick="toggle('lang')"><div class="setting-row"><span>🌐 Язык</span> <span id="s-lang" style="color:var(--accent)">РУССКИЙ</span></div></div>
    <div class="nft-card" onclick="tg.showAlert('Служба поддержки: @NFTzet_Support')"><div class="setting-row"><span>🛠 Служба поддержки</span> <span style="color:var(--accent)">ОТКРЫТЬ</span></div></div>
    <button class="btn btn-sec" onclick="location.reload()">🔄 Сбросить и обновить</button>
</div>

<nav class="nav">
    <div class="nav-item active" onclick="tab('market', this)">🛒</div>
    <div class="nav-item" onclick="tab('groups', this)">👥</div>
    <div class="nav-item" onclick="tab('create', this)">➕</div>
    <div class="nav-item" onclick="tab('profile', this)">👤</div>
    <div class="nav-item" onclick="tab('settings', this)">⚙️</div>
</nav>

<canvas id="canvas" style="display:none"></canvas>

<script>
    const tg = window.Telegram.WebApp;
    const CLOUD_URL = "https://api.jsonbin.io/v3/b/65fd5a7a1f5677401f4142e8"; 
    const API_KEY = "$2a$10$7XyH/zH2I2.M2.M1.m1.m1.m1.m1.m1.m1.m1.m1.m1.m1.m1.m1";

    let store = JSON.parse(localStorage.getItem('NFT_FIX_V4')) || {
        bal: {ton: 0, nf: 100}, bought: [], theme: 'dark', inc: false, priv: false, lang: 'ru',
        user: { name: tg.initDataUnsafe?.user?.first_name || "User", nickNFT: "" }
    };
    let globalData = { items: [], groups: [] };
    let tempImg = "";

    async function loadCloud() {
        try {
            const r = await fetch(`${CLOUD_URL}/latest`, { headers: { "X-Master-Key": API_KEY } });
            const d = await r.json(); globalData = d.record; updateUI();
        } catch(e) { console.log("Cloud sync error"); }
    }

    async function syncCloud() {
        await fetch(CLOUD_URL, {
            method: 'PUT',
            headers: { "Content-Type": "application/json", "X-Master-Key": API_KEY },
            body: JSON.stringify(globalData)
        });
        loadCloud();
    }

    function handleFile(f) {
        if (!f.files[0]) return;
        const reader = new FileReader();
        reader.onload = (e) => applyWatermark(e.target.result);
        reader.readAsDataURL(f.files[0]);
    }

    function applyWatermark(src) {
        const img = new Image();
        img.crossOrigin = "anonymous";
        img.onload = () => {
            const cvs = document.getElementById('canvas');
            const ctx = cvs.getContext('2d');
            
            cvs.width = img.width;
            cvs.height = img.height;
            ctx.drawImage(img, 0, 0);
            
            // КРУПНЫЙ ВОДЯНОЙ ЗНАК
            const fontSize = Math.floor(cvs.width / 8); 
            ctx.font = `bold ${fontSize}px Arial`;
            ctx.textAlign = "right";
            
            // Обводка для видимости на любом фоне
            ctx.strokeStyle = "black";
            ctx.lineWidth = fontSize / 10;
            ctx.strokeText("NFTzet", cvs.width - 30, cvs.height - 30);
            
            // Сама надпись
            ctx.fillStyle = "white";
            ctx.fillText("NFTzet", cvs.width - 30, cvs.height - 30);
            
            tempImg = cvs.toDataURL("image/jpeg", 0.8);
            document.getElementById('pre-box').innerHTML = `<img src="${tempImg}">`;
        };
        img.src = src;
    }

    async function publish(free) {
        const name = document.getElementById('nn').value;
        const desc = document.getElementById('nd').value;
        if(!name || !tempImg || desc.length < 5) return tg.showAlert("Заполни все поля и загрузи фото!");
        
        const item = {
            id: Date.now(), name, desc, img: tempImg,
            price: free ? 0 : (document.getElementById('np').value || 0),
            cur: document.getElementById('nc').value,
            author: store.user.name
        };
        globalData.items.unshift(item);
        await syncCloud();
        tg.showAlert("NFT Опубликовано!");
        tab('market', document.querySelectorAll('.nav-item')[0]);
    }

    function updateUI() {
        document.getElementById('bal-ton').innerText = store.bal.ton.toFixed(2);
        document.getElementById('bal-nf').innerText = store.bal.nf;
        document.getElementById('p-name').innerText = store.inc ? "Anonymous" : store.user.name;
        document.getElementById('p-sub').innerText = store.user.nickNFT ? `[${store.user.nickNFT}]` : "";
        document.getElementById('s-inc').innerText = store.inc ? "ВКЛ" : "ВЫКЛ";
        document.getElementById('s-theme').innerText = store.theme === 'dark' ? "ТЕМНАЯ" : "СВЕТЛАЯ";
        document.getElementById('s-priv').innerText = store.priv ? "ВКЛ" : "ВЫКЛ";
        document.getElementById('s-lang').innerText = store.lang === 'ru' ? "РУССКИЙ" : "EN";
        document.body.className = store.theme === 'light' ? 'light' : '';
        renderMarket(); renderGroups(); renderBought();
    }

    function renderMarket() {
        const l = document.getElementById('market-list'); l.innerHTML = '';
        globalData.items.forEach(i => {
            l.innerHTML += `<div class="nft-card">
                <div class="img-box"><img src="${i.img}"></div>
                <div style="padding-top:10px">
                    <h3 style="margin:0">${i.name}</h3>
                    <p style="font-size:13px; opacity:0.7; margin:5px 0">${i.desc}</p>
                    <button class="btn" onclick="buy(${i.id})">Купить за ${i.price} ${i.cur}</button>
                </div>
            </div>`;
        });
    }

    function buy(id) {
        const itm = globalData.items.find(i => i.id === id);
        store.bought.unshift(itm);
        saveLocal();
        tg.showAlert("Готово! NFT в твоей коллекции.");
        updateUI();
    }

    async function createGroup() {
        const n = prompt("Название сообщества:");
        if(n) { globalData.groups.push(n); await syncCloud(); }
    }

    function renderGroups() {
        const l = document.getElementById('group-list'); l.innerHTML = '';
        globalData.groups.forEach(g => { l.innerHTML += `<div class="nft-card">👥 <b>${g}</b></div>`; });
    }

    function renderBought() {
        const l = document.getElementById('bought-list'); l.innerHTML = '';
        store.bought.forEach(i => {
            l.innerHTML += `<div class="nft-card"><div class="img-box"><img src="${i.img}"></div><h3 style="text-align:center">${i.name}</h3></div>`;
        });
    }

    function tab(id, el) {
        document.querySelectorAll('.tabs').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active'); 
        el.classList.add('active');
        if(id === 'groups') renderGroups();
    }

    function toggle(t) {
        if(t==='theme') store.theme = store.theme==='dark' ? 'light' : 'dark';
        else if(t==='lang') store.lang = store.lang==='ru' ? 'en' : 'ru';
        else store[t] = !store[t];
        saveLocal();
    }

    function saveLocal() { localStorage.setItem('NFT_FIX_V4', JSON.stringify(store)); updateUI(); }
    function editName() { const n = prompt("Ник:", store.user.name); if(n) {store.user.name = n; saveLocal();} }
    function aiGen() { applyWatermark(`https://picsum.photos/1000/1000?random=${Date.now()}`); }

    loadCloud(); updateUI();
</script>
</body>
</html>
