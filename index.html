<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NFTzet Ecosystem v2.0</title>
    <style>
        :root {
            --bg: #05070a;
            --surface: rgba(255, 255, 255, 0.05);
            --accent: #00d2ff;
            --accent-2: #9d50bb;
            --text: #ffffff;
            --text-dim: #94a3b8;
            --error: #ef4444;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            background-image: radial-gradient(circle at 50% 0%, #1e1b4b 0%, var(--bg) 70%);
            color: var(--text);
            margin: 0; padding: 0;
            height: 100vh; display: flex; flex-direction: column;
            overflow: hidden;
        }

        /* Навигация */
        nav {
            position: fixed; bottom: 0; width: 100%;
            background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px);
            display: flex; justify-content: space-around;
            padding: 10px 0 25px; border-top: 1px solid rgba(255,255,255,0.1);
            z-index: 1000;
        }

        nav button {
            background: none; border: none; color: var(--text-dim);
            font-size: 11px; display: flex; flex-direction: column; align-items: center; gap: 4px;
        }

        nav button.active { color: var(--accent); }

        /* Контент */
        .app-container { flex: 1; padding: 20px; padding-bottom: 100px; overflow-y: auto; }
        .tab-section { display: none; }
        .tab-section.active { display: block; animation: fadeIn 0.3s ease; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .glass-card {
            background: var(--surface); backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 20px;
            padding: 20px; margin-bottom: 15px; position: relative;
        }

        /* Профиль */
        .avatar-box {
            width: 80px; height: 80px; border-radius: 50%;
            background: linear-gradient(45deg, var(--accent), var(--accent-2));
            margin: 0 auto 10px; display: flex; align-items: center; justify-content: center;
            font-size: 35px; border: 2px solid rgba(255,255,255,0.2);
        }

        /* Превью NFT и водяной знак */
        .preview-container {
            width: 100%; height: 220px; border-radius: 15px;
            background: #000; position: relative; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            border: 1px dashed var(--text-dim);
        }

        #nft-media-preview { width: 100%; height: 100%; object-fit: cover; display: none; }

        .watermark {
            position: absolute; bottom: 8px; right: 12px;
            font-size: 14px; font-weight: 900; color: rgba(255,255,255,0.7);
            text-shadow: 0 0 4px rgba(0,0,0,0.8); pointer-events: none;
            font-style: italic; z-index: 10;
        }

        .shiny-overlay {
            position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
            transform: skewX(-20deg); animation: shine 4s infinite;
        }

        @keyframes shine { 100% { left: 200%; } }

        /* Элементы управления */
        .btn-main {
            width: 100%; padding: 12px; border-radius: 12px; border: none;
            background: linear-gradient(90deg, var(--accent), #3a7bd5);
            color: white; font-weight: bold; cursor: pointer; margin-top: 10px;
        }

        .btn-sub {
            width: 100%; padding: 10px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.2);
            background: transparent; color: white; margin-top: 8px; cursor: pointer;
        }

        input, select, textarea {
            width: 100%; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1);
            padding: 10px; border-radius: 10px; color: white; margin: 5px 0 12px; box-sizing: border-box;
        }

        /* Модальные окна */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center;
        }

        .modal-content { background: #1a1c23; width: 85%; padding: 25px; border-radius: 20px; border: 1px solid var(--accent); }

        .limited-tag {
            position: absolute; top: 10px; left: 10px; background: var(--error);
            color: white; padding: 3px 8px; border-radius: 5px; font-size: 10px; font-weight: bold;
        }
    </style>
</head>
<body id="app-body">

<div class="app-container">
    
    <section id="profile" class="tab-section active">
        <div class="glass-card" style="text-align: center;">
            <div class="avatar-box" id="p-ava">👤</div>
            <h2 id="p-nick" style="margin: 5px 0;">User_Zet</h2>
            <p id="p-status" style="font-size: 12px; color: var(--text-dim);">NFT Creator</p>
            
            <div id="p-stats" style="display: flex; justify-content: space-around; margin: 15px 0;">
                <span><b>150</b><br><small>Подписчики</small></span>
                <span><b>12</b><br><small>NFT</small></span>
            </div>

            <button class="btn-sub" onclick="toggleIncognito()">🎩 Режим Инкогнито</button>
            <button class="btn-sub" onclick="openModal('nft-select')">🖼 Поставить NFT на ник</button>
            <button class="btn-sub" onclick="togglePrivacy()">🔒 Приватный режим: <span id="priv-status">ВЫКЛ</span></button>
        </div>
    </section>

    <section id="market" class="tab-section">
        <h2>Маркетплейс</h2>
        <div id="market-list">
            <div class="glass-card">
                <div class="preview-container">
                    <img src="https://via.placeholder.com/300x200/111/fff?text=Sample+NFT" style="display:block; width:100%; height:100%; object-fit:cover;">
                    <div class="watermark">NFTzet</div>
                </div>
                <h3>Super Blade</h3>
                <p style="font-size: 12px;">Цена: 50 TON</p>
                <button class="btn-main" onclick="alert('Куплено!')">Купить</button>
                <button class="btn-sub" onclick="openModal('complaint')">Пожаловаться</button>
            </div>
        </div>
    </section>

    <section id="create" class="tab-section">
        <h2>Создать NFT</h2>
        <div class="glass-card">
            <div class="preview-container" id="drop-area">
                <span id="upload-text">Нажмите для загрузки<br>(PNG, JPG, MP4)</span>
                <video id="nft-video-preview" style="display:none; width:100%; height:100%; object-fit:cover;" autoplay muted loop></video>
                <img id="nft-img-preview" style="display:none; width:100%; height:100%; object-fit:cover;">
                <div class="shiny-overlay"></div>
                <div class="watermark" id="create-watermark">NFTzet</div>
            </div>
            <input type="file" id="file-input" hidden accept="image/*,video/mp4">
            
            <input type="text" id="nft-name" placeholder="Название NFT">
            <textarea id="nft-desc" placeholder="Описание..."></textarea>
            
            <div style="display: flex; gap: 8px;">
                <input type="number" id="nft-price" placeholder="Цена">
                <select id="nft-currency">
                    <option>TON</option>
                    <option>NFcoin</option>
                    <option>ClaudeCoin</option>
                </select>
            </div>

            <label style="font-size: 12px; display: flex; align-items: center; gap: 5px; margin-bottom: 10px;">
                <input type="checkbox" id="nft-elite" style="width: auto; margin: 0;"> Элитный (1000 TON / 10k NF)
            </label>

            <button class="btn-main" onclick="publishNFT(false)">Опубликовать</button>
            <button class="btn-sub" onclick="publishNFT(true)" style="color: var(--accent);">Опубликовать БЕСПЛАТНО</button>
        </div>
    </section>

    <section id="comm" class="tab-section">
        <div style="display:flex; justify-content: space-between; align-items: center;">
            <h2>Сообщества</h2>
            <button class="btn-main" style="width: auto; padding: 5px 15px;" onclick="openModal('create-comm')">+</button>
        </div>
        <div id="comm-list">
            <p style="color: var(--text-dim);">У вас пока нет сообществ.</p>
        </div>
    </section>

    <section id="settings" class="tab-section">
        <h2>Настройки</h2>
        <div class="glass-card">
            <label>Язык</label>
            <select id="lang-select" onchange="saveAll()">
                <option>Русский (основной)</option>
                <option>English</option>
                <option>Chinese</option>
                <option>Japanese</option>
                <option>Georgian</option>
                <option>Armenian</option>
            </select>

            <button class="btn-sub" onclick="toggleTheme()">🌓 Сменить тему (Чёрная/Белая)</button>
            <button class="btn-sub" onclick="openModal('support')">🛠 Служба поддержки</button>
            <button class="btn-main" style="background: var(--error);" onclick="location.reload()">🔄 Перезагрузить приложение</button>
        </div>
    </section>
</div>

<div id="modal-container" class="modal" onclick="closeModal(event)">
    <div id="support" class="modal-content" style="display:none;">
        <h3>Поддержка</h3>
        <textarea placeholder="Опишите вашу проблему..." style="height: 100px;"></textarea>
        <button class="btn-main" onclick="alert('Сообщение отправлено!'); closeModal()">Отправить</button>
    </div>

    <div id="create-comm" class="modal-content" style="display:none;">
        <h3>Новое сообщество</h3>
        <input type="text" id="c-name" placeholder="Название">
        <input type="number" id="c-price" placeholder="Цена входа (TON/NF)">
        <label><input type="checkbox" id="c-priv" style="width:auto;"> Приватное</label>
        <button class="btn-main" onclick="createCommunity()">Создать</button>
    </div>

    <div id="complaint" class="modal-content" style="display:none;">
        <h3>Жалоба</h3>
        <select><option>Спам</option><option>Мошенничество</option><option>Оскорбление</option></select>
        <button class="btn-main" onclick="alert('Жалоба принята!'); closeModal()">Отправить</button>
    </div>

    <div id="nft-select" class="modal-content" style="display:none;">
        <h3>Ваши NFT</h3>
        <p style="font-size:12px;">Выберите NFT для ника:</p>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;" id="my-nfts">
            <small>Пусто...</small>
        </div>
    </div>
</div>

<nav>
    <button onclick="tab('profile', this)" class="active">👤 Профиль</button>
    <button onclick="tab('market', this)">🛒 Маркет</button>
    <button onclick="tab('create', this)">✨ Создать</button>
    <button onclick="tab('comm', this)">👥 Группы</button>
    <button onclick="tab('settings', this)">⚙️ Опции</button>
</nav>

<script>
    // --- ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ---
    let state = {
        nick: "User_Zet",
        incognito: false,
        privacy: false,
        theme: 'dark',
        communities: [],
        myNFTs: []
    };

    // --- ЛОГИКА ВКЛАДОК ---
    function tab(name, btn) {
        document.querySelectorAll('.tab-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById(name).classList.add('active');
        btn.classList.add('active');
    }

    // --- ИНКОГНИТО И ПРИВАТНОСТЬ ---
    function toggleIncognito() {
        state.incognito = !state.incognito;
        const nickElem = document.getElementById('p-nick');
        const avaElem = document.getElementById('p-ava');
        
        if(state.incognito) {
            nickElem.innerText = "Secret";
            avaElem.innerText = "🎩";
            avaElem.style.background = "#111";
        } else {
            nickElem.innerText = state.nick;
            avaElem.innerText = "👤";
            avaElem.style.background = "linear-gradient(45deg, var(--accent), var(--accent-2))";
        }
        saveAll();
    }

    function togglePrivacy() {
        state.privacy = !state.privacy;
        document.getElementById('priv-status').innerText = state.privacy ? "ВКЛ" : "ВЫКЛ";
        saveAll();
    }

    // --- ЗАГРУЗКА ФАЙЛОВ И СОЗДАНИЕ NFT ---
    const dropArea = document.getElementById('drop-area');
    const fileInput = document.getElementById('file-input');
    const imgPre = document.getElementById('nft-img-preview');
    const vidPre = document.getElementById('nft-video-preview');

    dropArea.onclick = () => fileInput.click();

    fileInput.onchange = (e) => {
        const file = e.target.files[0];
        if(!file) return;

        const url = URL.createObjectURL(file);
        document.getElementById('upload-text').style.display = 'none';

        if(file.type.startsWith('image/')) {
            imgPre.src = url;
            imgPre.style.display = 'block';
            vidPre.style.display = 'none';
        } else if(file.type === 'video/mp4') {
            vidPre.src = url;
            vidPre.style.display = 'block';
            imgPre.style.display = 'none';
            // Проверка 5 секунд
            vidPre.onloadedmetadata = () => {
                if(vidPre.duration > 5) {
                    alert("Видео длиннее 5 секунд! Оно будет автоматически обрезано.");
                }
            };
        }
    };

    function publishNFT(isFree) {
        const name = document.getElementById('nft-name').value;
        if(!name) return alert("Введите название!");
        
        alert(isFree ? "Опубликовано бесплатно в маркет!" : "Опубликовано в маркет!");
        // В реальности тут идет отправка в "облако"
        saveAll();
    }

    // --- СООБЩЕСТВА ---
    function createCommunity() {
        const name = document.getElementById('c-name').value;
        if(!name) return;
        state.communities.push({name, price: document.getElementById('c-price').value});
        renderComm();
        closeModal();
        saveAll();
    }

    function renderComm() {
        const list = document.getElementById('comm-list');
        list.innerHTML = state.communities.map(c => `
            <div class="glass-card">
                <h3>${c.name}</h3>
                <button class="btn-sub">Вход: ${c.price || '0'} TON</button>
            </div>
        `).join('');
    }

    // --- МОДАЛКИ ---
    function openModal(id) {
        document.getElementById('modal-container').style.display = 'flex';
        document.querySelectorAll('.modal-content').forEach(c => c.style.display = 'none');
        document.getElementById(id).style.display = 'block';
    }

    function closeModal(e) {
        if(!e || e.target.id === 'modal-container' || e.type === 'click') {
            document.getElementById('modal-container').style.display = 'none';
        }
    }

    function toggleTheme() {
        state.theme = state.theme === 'dark' ? 'light' : 'dark';
        document.body.style.filter = state.theme === 'light' ? 'invert(0.9) hue-rotate(180deg)' : 'none';
        saveAll();
    }

    // --- СОХРАНЕНИЕ ---
    function saveAll() {
        localStorage.setItem('nftzet_data', JSON.stringify(state));
    }

    window.onload = () => {
        const data = localStorage.getItem('nftzet_data');
        if(data) {
            state = JSON.parse(data);
            renderComm();
            if(state.incognito) { state.incognito = false; toggleIncognito(); }
            document.getElementById('priv-status').innerText = state.privacy ? "ВКЛ" : "ВЫКЛ";
        }
    };
</script>

</body>
</html>
